openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: course
    description: Course content (weeks, lectures, topics)
  - name: assignments
    description: Homeworks, tests, midterm, final
  - name: practice
    description: Infinite practice sessions and adaptive problem generation
  - name: tutor
    description: AI tutor chat
  - name: detection
    description: AI-generation and diachronic detection
  - name: analytics
    description: User performance analytics and reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /course/overview:
    get:
      operationId: getCourseOverview
      tags: [course]
      summary: Course-level overview with weeks, assignments, and progress
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseOverview"

  /course/weeks/{weekNumber}:
    get:
      operationId: getWeek
      tags: [course]
      summary: Get one week's lectures and assignment list
      parameters:
        - name: weekNumber
          in: path
          required: true
          schema: { type: integer, minimum: 1, maximum: 4 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Week"

  /course/lectures/{lectureId}:
    get:
      operationId: getLecture
      tags: [course]
      summary: Get the full lecture text for a topic
      parameters:
        - name: lectureId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lecture"

  /course/topics:
    get:
      operationId: listTopics
      tags: [course]
      summary: List all course topics (used for analytics + tutor scoping)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /assignments:
    get:
      operationId: listAssignments
      tags: [assignments]
      summary: List all assignments (homeworks, tests, midterm, final)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssignmentSummary"

  /assignments/{assignmentId}:
    get:
      operationId: getAssignment
      tags: [assignments]
      summary: Get an assignment with its problems
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /assignments/{assignmentId}/start:
    post:
      operationId: startAssignmentAttempt
      tags: [assignments]
      summary: Start (or resume) an attempt on an assignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptState"

  /assignments/attempts/{attemptId}:
    get:
      operationId: getAttempt
      tags: [assignments]
      summary: Get current attempt state (answers, time remaining)
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptState"

  /assignments/attempts/{attemptId}/answer:
    put:
      operationId: saveAnswer
      tags: [assignments]
      summary: Save (or update) a single answer with keystroke trace
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerSaved"

  /assignments/attempts/{attemptId}/submit:
    post:
      operationId: submitAttempt
      tags: [assignments]
      summary: Submit the attempt for grading (also runs AI + diachronic detection)
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResult"

  /assignments/attempts/{attemptId}/result:
    get:
      operationId: getAttemptResult
      tags: [assignments]
      summary: Get the graded result of a previously submitted attempt (for review)
      parameters:
        - name: attemptId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResult"

  /practice/sessions:
    post:
      operationId: startPracticeSession
      tags: [practice]
      summary: Start a new practice session (infinite, adaptive)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeSessionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeSession"

  /practice/sessions/{sessionId}/next:
    post:
      operationId: nextPracticeProblem
      tags: [practice]
      summary: Generate the next problem (adaptive difficulty, de-novo)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NextProblemInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeProblem"

  /practice/sessions/{sessionId}/grade:
    post:
      operationId: gradePracticeAnswer
      tags: [practice]
      summary: Grade a practice answer; returns correct/incorrect and explanation
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeAnswerInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeGrade"

  /tutor/ask:
    post:
      operationId: askTutor
      tags: [tutor]
      summary: Ask the AI tutor a question (text reply with optional spoken audio URL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TutorAskInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TutorReply"

  /detection/scan:
    post:
      operationId: scanText
      tags: [detection]
      summary: Run AI-generation + diachronic detection on a candidate answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionScanInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Overall performance summary (averages, attempts, streaks)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/topics:
    get:
      operationId: getTopicAnalytics
      tags: [analytics]
      summary: Per-topic accuracy and strength/weakness ranking
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopicAnalytics"

  /analytics/activity:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Recent practice + assignment activity timeline
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /analytics/report:
    post:
      operationId: generateReport
      tags: [analytics]
      summary: Generate a narrative strengths/weaknesses report
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsReport"

  /course/lectures/{lectureId}/expand:
    post:
      operationId: expandLecture
      tags: [course]
      summary: Generate the medium or long version of a single lecture on the spot
      parameters:
        - name: lectureId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LectureExpandInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lecture"

  /assignments/{assignmentId}/practice:
    post:
      operationId: createPracticeExam
      tags: [practice]
      summary: Generate a fresh, infinite practice version of a graded assignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeExam"

  /assignments/{assignmentId}/readiness:
    get:
      operationId: getAssignmentReadiness
      tags: [analytics]
      summary: Analytics-driven readiness + surgical focus pointers for a graded assignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentReadiness"

  /practice-exams/{sessionId}:
    get:
      operationId: getPracticeExam
      tags: [practice]
      summary: Get a practice exam session with its problems
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeExam"

  /practice-exams/{sessionId}/submit:
    post:
      operationId: submitPracticeExam
      tags: [practice]
      summary: Submit a practice exam; returns heavy per-problem + overall feedback and focus pointers
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PracticeExamSubmitInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeExamResult"

  /practice-exams/{sessionId}/feedback:
    get:
      operationId: getFeedbackMessages
      tags: [practice]
      summary: Get the feedback dialogue history for a practice exam
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackMessage"

  /practice-exams/{sessionId}/feedback/ask:
    post:
      operationId: askFeedback
      tags: [practice]
      summary: Ask a follow-up question about the feedback; returns the coach's reply
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackAskInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackMessage"

  /profile:
    get:
      operationId: getLearnerProfile
      tags: [analytics]
      summary: The evolving learner profile aggregated from all logged activity
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnerProfile"

  /assessments/overview:
    get:
      operationId: getAssessmentsOverview
      tags: [assessments]
      summary: Status of the 5 graded diagnostic slots, the 20% grade component, and recent self-assessments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentsOverview"

  /assessments/start:
    post:
      operationId: startAssessment
      tags: [assessments]
      summary: Start (or resume) a diagnostic assessment for a slot; generates fresh, unique questions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartAssessmentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticSession"

  /assessments/submit:
    post:
      operationId: submitAssessment
      tags: [assessments]
      summary: Submit answers; scores the assessment, records pass/fail, returns per-skill breakdown and written feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAssessmentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticResult"

  /assessments/sessions/{sessionId}:
    get:
      operationId: getAssessmentSession
      tags: [assessments]
      summary: Get a diagnostic session — questions if in progress, full graded result if submitted
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticSessionOrResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Topic:
      type: object
      required: [id, slug, title, weekNumber]
      properties:
        id: { type: integer }
        slug: { type: string }
        title: { type: string }
        weekNumber: { type: integer }
        blurb: { type: ["string", "null"] }

    Lecture:
      type: object
      required: [id, topicId, title, weekNumber, body]
      properties:
        id: { type: integer }
        topicId: { type: integer }
        title: { type: string }
        weekNumber: { type: integer }
        body:
          type: string
          description: Short Markdown lecture text (the baseline / minimum-detail version). The frontend lets users select passages and send them to the tutor.
        bodyMedium:
          type: ["string", "null"]
          description: Medium-length version with more explanation and more examples. Null if not yet generated.
        bodyLong:
          type: ["string", "null"]
          description: Long version with the most explanation and the most examples. Null if not yet generated.

    Week:
      type: object
      required: [weekNumber, title, lectures, assignments]
      properties:
        weekNumber: { type: integer }
        title: { type: string }
        summary: { type: ["string", "null"] }
        lectures:
          type: array
          items:
            $ref: "#/components/schemas/LectureRef"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/AssignmentSummary"

    LectureRef:
      type: object
      required: [id, title, topicId]
      properties:
        id: { type: integer }
        title: { type: string }
        topicId: { type: integer }

    AssignmentSummary:
      type: object
      required: [id, kind, title, weekNumber, problemCount, isTimed, status]
      properties:
        id: { type: integer }
        kind:
          type: string
          enum: [homework, test, midterm, final]
        title: { type: string }
        weekNumber: { type: integer }
        problemCount: { type: integer }
        isTimed: { type: boolean }
        timeLimitMinutes: { type: ["integer", "null"] }
        status:
          type: string
          enum: [not_started, in_progress, submitted]
        bestScore: { type: ["number", "null"] }
        lastAttemptId: { type: ["integer", "null"] }

    Assignment:
      type: object
      required: [id, kind, title, weekNumber, isTimed, problems]
      properties:
        id: { type: integer }
        kind:
          type: string
          enum: [homework, test, midterm, final]
        title: { type: string }
        weekNumber: { type: integer }
        isTimed: { type: boolean }
        timeLimitMinutes: { type: ["integer", "null"] }
        instructions: { type: ["string", "null"] }
        problems:
          type: array
          items:
            $ref: "#/components/schemas/Problem"

    Problem:
      type: object
      required: [id, position, prompt, topicId]
      properties:
        id: { type: integer }
        position: { type: integer }
        prompt: { type: string }
        topicId: { type: integer }
        topicTitle: { type: ["string", "null"] }
        hint: { type: ["string", "null"] }

    AttemptState:
      type: object
      required: [id, assignmentId, status, startedAt, answers]
      properties:
        id: { type: integer }
        assignmentId: { type: integer }
        status:
          type: string
          enum: [in_progress, submitted]
        startedAt: { type: string, format: date-time }
        submittedAt: { type: ["string", "null"], format: date-time }
        deadlineAt: { type: ["string", "null"], format: date-time }
        answers:
          type: array
          items:
            $ref: "#/components/schemas/SavedAnswer"

    SavedAnswer:
      type: object
      required: [problemId, answer]
      properties:
        problemId: { type: integer }
        answer: { type: string }
        keystrokeCount: { type: ["integer", "null"] }
        eraseCount: { type: ["integer", "null"] }

    AnswerInput:
      type: object
      required: [problemId, answer, trace]
      properties:
        problemId: { type: integer }
        answer: { type: string }
        trace:
          $ref: "#/components/schemas/KeystrokeTrace"

    KeystrokeTrace:
      type: object
      required: [keystrokeCount, eraseCount, durationMs]
      properties:
        keystrokeCount: { type: integer }
        eraseCount: { type: integer }
        bulkInsertCount: { type: integer, default: 0 }
        longestBulkInsertChars: { type: integer, default: 0 }
        rewriteSegments: { type: integer, default: 0 }
        durationMs: { type: integer }

    AnswerSaved:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    AttemptResult:
      type: object
      required: [attemptId, score, total, percent, perProblem, detection]
      properties:
        attemptId: { type: integer }
        score: { type: number }
        total: { type: number }
        percent: { type: number }
        perProblem:
          type: array
          items:
            $ref: "#/components/schemas/ProblemResult"
        detection:
          type: array
          items:
            $ref: "#/components/schemas/DetectionResult"

    ProblemResult:
      type: object
      required: [problemId, correct, explanation]
      properties:
        problemId: { type: integer }
        correct: { type: boolean }
        userAnswer: { type: string }
        correctAnswer: { type: string }
        explanation: { type: string }

    PracticeSessionInput:
      type: object
      required: [tutorEnabled]
      properties:
        weekNumber: { type: ["integer", "null"] }
        topicId: { type: ["integer", "null"] }
        tutorEnabled: { type: boolean }
        focusOnWeaknesses: { type: boolean, default: true }
        initialDifficulty:
          type: ["number", "null"]
          description: Starting difficulty 1-5; if omitted defaults to 2.0

    PracticeSession:
      type: object
      required: [id, tutorEnabled, difficulty, weekNumber]
      properties:
        id: { type: integer }
        tutorEnabled: { type: boolean }
        difficulty: { type: number }
        weekNumber: { type: ["integer", "null"] }
        topicId: { type: ["integer", "null"] }
        focusOnWeaknesses: { type: boolean }

    NextProblemInput:
      type: object
      properties:
        request:
          type: ["string", "null"]
          description: Free-form user request, e.g. "give me harder probability problems"
        topicId: { type: ["integer", "null"] }

    PracticeProblem:
      type: object
      required: [id, prompt, topicId, difficulty]
      properties:
        id: { type: integer }
        prompt: { type: string }
        topicId: { type: integer }
        topicTitle: { type: string }
        difficulty: { type: number }

    PracticeAnswerInput:
      type: object
      required: [problemId, answer, trace]
      properties:
        problemId: { type: integer }
        answer: { type: string }
        trace:
          $ref: "#/components/schemas/KeystrokeTrace"

    PracticeGrade:
      type: object
      required: [problemId, correct, explanation, newDifficulty]
      properties:
        problemId: { type: integer }
        correct: { type: boolean }
        correctAnswer: { type: string }
        explanation: { type: string }
        newDifficulty: { type: number }
        tutorTip: { type: ["string", "null"] }

    TutorAskInput:
      type: object
      required: [message]
      properties:
        sessionId: { type: ["integer", "null"] }
        message: { type: string }
        selectedLectureText: { type: ["string", "null"] }
        lectureId: { type: ["integer", "null"] }
        problemId: { type: ["integer", "null"] }

    TutorReply:
      type: object
      required: [text]
      properties:
        text: { type: string }
        audioUrl: { type: ["string", "null"] }

    DetectionScanInput:
      type: object
      required: [text, trace]
      properties:
        text: { type: string }
        trace:
          $ref: "#/components/schemas/KeystrokeTrace"

    DetectionResult:
      type: object
      required: [problemId, aiScore, aiFlagged, diachronicScore, diachronicFlagged, rationale]
      properties:
        problemId: { type: ["integer", "null"] }
        aiScore:
          type: number
          description: 0..1 probability the text is AI-generated
        aiFlagged: { type: boolean }
        diachronicScore:
          type: number
          description: 0..1 probability the user is rewording AI output (based on keystroke pattern)
        diachronicFlagged: { type: boolean }
        rationale: { type: string }

    AnalyticsSummary:
      type: object
      required: [officialAverage, practiceAccuracy, attemptsCount, practiceCount, streakDays]
      properties:
        officialAverage: { type: number }
        practiceAccuracy: { type: number }
        attemptsCount: { type: integer }
        practiceCount: { type: integer }
        streakDays: { type: integer }
        strongestTopic: { type: ["string", "null"] }
        weakestTopic: { type: ["string", "null"] }

    TopicAnalytics:
      type: object
      required: [topicId, topicTitle, weekNumber, attempts, accuracy, strengthLabel]
      properties:
        topicId: { type: integer }
        topicTitle: { type: string }
        weekNumber: { type: integer }
        attempts: { type: integer }
        accuracy: { type: number }
        strengthLabel:
          type: string
          enum: [strong, solid, developing, weak, untested]

    ActivityItem:
      type: object
      required: [id, kind, title, at]
      properties:
        id: { type: integer }
        kind:
          type: string
          enum: [practice, assignment]
        title: { type: string }
        at: { type: string, format: date-time }
        score: { type: ["number", "null"] }
        topicTitle: { type: ["string", "null"] }

    AnalyticsReport:
      type: object
      required: [generatedAt, narrative, strengths, weaknesses, recommendations]
      properties:
        generatedAt: { type: string, format: date-time }
        narrative: { type: string }
        strengths:
          type: array
          items: { type: string }
        weaknesses:
          type: array
          items: { type: string }
        recommendations:
          type: array
          items: { type: string }

    CourseOverview:
      type: object
      required: [title, weeks, totals]
      properties:
        title: { type: string }
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/Week"
        totals:
          type: object
          required: [assignmentsCompleted, assignmentsTotal, practiceCount]
          properties:
            assignmentsCompleted: { type: integer }
            assignmentsTotal: { type: integer }
            practiceCount: { type: integer }

    LectureExpandInput:
      type: object
      required: [level]
      properties:
        level:
          type: string
          enum: [medium, long]

    PracticeExam:
      type: object
      required: [id, assignmentId, assignmentTitle, kind, weekNumber, status, createdAt, problems]
      properties:
        id: { type: integer }
        assignmentId: { type: integer }
        assignmentTitle: { type: string }
        kind:
          type: string
          enum: [homework, test, midterm, final]
        weekNumber: { type: integer }
        status:
          type: string
          enum: [in_progress, submitted]
        createdAt: { type: string, format: date-time }
        problems:
          type: array
          items:
            $ref: "#/components/schemas/PracticeExamProblem"

    PracticeExamProblem:
      type: object
      required: [id, position, prompt, topicId, difficulty]
      properties:
        id: { type: integer }
        position: { type: integer }
        prompt: { type: string }
        topicId: { type: integer }
        topicTitle: { type: ["string", "null"] }
        difficulty: { type: number }

    PracticeExamSubmitInput:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/PracticeExamAnswerInput"

    PracticeExamAnswerInput:
      type: object
      required: [problemId, answer, trace]
      properties:
        problemId: { type: integer }
        answer: { type: string }
        trace:
          $ref: "#/components/schemas/KeystrokeTrace"

    PracticeExamResult:
      type: object
      required: [sessionId, score, total, percent, perProblem, overallFeedback, focusPointers, encouragement]
      properties:
        sessionId: { type: integer }
        score: { type: number }
        total: { type: number }
        percent: { type: number }
        perProblem:
          type: array
          items:
            $ref: "#/components/schemas/PracticeExamProblemFeedback"
        overallFeedback: { type: string }
        focusPointers:
          type: array
          items:
            $ref: "#/components/schemas/FocusPointer"
        encouragement: { type: string }

    PracticeExamProblemFeedback:
      type: object
      required: [problemId, prompt, correct, feedback, correctAnswer, explanation]
      properties:
        problemId: { type: integer }
        prompt: { type: string }
        topicTitle: { type: ["string", "null"] }
        userAnswer: { type: string }
        correctAnswer: { type: string }
        correct: { type: boolean }
        feedback: { type: string }
        explanation: { type: string }

    FocusPointer:
      type: object
      required: [topicTitle, severity, why, action]
      properties:
        topicId: { type: ["integer", "null"] }
        topicTitle: { type: string }
        severity:
          type: string
          enum: [critical, important, minor]
        why: { type: string }
        action: { type: string }

    FeedbackMessage:
      type: object
      required: [id, role, content, at]
      properties:
        id: { type: integer }
        role:
          type: string
          enum: [student, coach]
        content: { type: string }
        at: { type: string, format: date-time }

    FeedbackAskInput:
      type: object
      required: [message]
      properties:
        message: { type: string }

    AssignmentReadiness:
      type: object
      required: [assignmentId, assignmentTitle, kind, readiness, label, summary, pointers, practiceCount, recommendPractice]
      properties:
        assignmentId: { type: integer }
        assignmentTitle: { type: string }
        kind:
          type: string
          enum: [homework, test, midterm, final]
        readiness:
          type: number
          description: 0-100 readiness score for the graded assignment
        label:
          type: string
          enum: [not_ready, getting_there, ready, mastered]
        summary: { type: string }
        pointers:
          type: array
          items:
            $ref: "#/components/schemas/FocusPointer"
        practiceCount: { type: integer }
        recommendPractice: { type: boolean }

    ProfileTopic:
      type: object
      required: [topicId, topicTitle, weekNumber, mastery, attempts, label]
      properties:
        topicId: { type: integer }
        topicTitle: { type: string }
        weekNumber: { type: integer }
        mastery: { type: number }
        attempts: { type: integer }
        label:
          type: string
          enum: [strong, solid, developing, weak, untested]

    LearnerProfile:
      type: object
      required: [generatedAt, totalEvents, practiceExamCount, practiceCount, gradedCount, narrative, strengths, focusAreas, topics]
      properties:
        generatedAt: { type: string, format: date-time }
        totalEvents: { type: integer }
        practiceExamCount: { type: integer }
        practiceCount: { type: integer }
        gradedCount: { type: integer }
        narrative: { type: string }
        strengths:
          type: array
          items: { type: string }
        focusAreas:
          type: array
          items:
            $ref: "#/components/schemas/FocusPointer"
        topics:
          type: array
          items:
            $ref: "#/components/schemas/ProfileTopic"

    AssessmentSlotStatus:
      type: object
      required: [slot, label, description, graded, status, sessionId, scorePercent, passed, submittedAt]
      properties:
        slot:
          type: string
          enum: [baseline, module_1, module_2, module_3, module_4]
        label: { type: string }
        description: { type: string }
        graded: { type: boolean }
        status:
          type: string
          enum: [not_started, in_progress, submitted]
        sessionId: { type: ["integer", "null"] }
        scorePercent: { type: ["number", "null"] }
        passed: { type: ["boolean", "null"] }
        submittedAt: { type: ["string", "null"], format: date-time }

    AssessmentSelfSession:
      type: object
      required: [sessionId, scorePercent, submittedAt]
      properties:
        sessionId: { type: integer }
        scorePercent: { type: number }
        submittedAt: { type: string, format: date-time }

    AssessmentsOverview:
      type: object
      required: [slots, gradedTaken, gradedTotal, gradedComponent, weightPercent, selfHistory]
      properties:
        slots:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentSlotStatus"
        gradedTaken:
          type: integer
          description: Number of the 5 graded slots that have been submitted
        gradedTotal: { type: integer }
        gradedComponent:
          type: number
          description: gradedTaken / gradedTotal * 100 (pass/fail, taking = pass)
        weightPercent:
          type: number
          description: How much the diagnostics jointly count toward the final grade
        selfHistory:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentSelfSession"

    StartAssessmentInput:
      type: object
      required: [slot]
      properties:
        slot:
          type: string
          enum: [baseline, module_1, module_2, module_3, module_4, self]

    DiagnosticQuestionPublic:
      type: object
      required: [id, skill, prompt, options]
      properties:
        id: { type: integer, description: Zero-based index of the question within the session }
        skill: { type: string }
        prompt: { type: string }
        options:
          type: array
          items: { type: string }

    DiagnosticSession:
      type: object
      required: [id, slot, label, graded, status, total, questions]
      properties:
        id: { type: integer }
        slot:
          type: string
          enum: [baseline, module_1, module_2, module_3, module_4, self]
        label: { type: string }
        graded: { type: boolean }
        status:
          type: string
          enum: [in_progress, submitted]
        total: { type: integer }
        questions:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticQuestionPublic"

    SubmitAssessmentAnswer:
      type: object
      required: [questionId, choice]
      properties:
        questionId: { type: integer }
        choice:
          type: integer
          description: Selected option index, or -1 if skipped

    SubmitAssessmentInput:
      type: object
      required: [sessionId, answers]
      properties:
        sessionId: { type: integer }
        answers:
          type: array
          items:
            $ref: "#/components/schemas/SubmitAssessmentAnswer"

    DiagnosticSkillScore:
      type: object
      required: [skill, correct, total, percent]
      properties:
        skill: { type: string }
        correct: { type: integer }
        total: { type: integer }
        percent: { type: number }

    DiagnosticQuestionReview:
      type: object
      required: [id, skill, prompt, options, choice, correctIndex, correct, explanation]
      properties:
        id: { type: integer }
        skill: { type: string }
        prompt: { type: string }
        options:
          type: array
          items: { type: string }
        choice:
          type: integer
          description: The option index the student selected, or -1 if skipped
        correctIndex: { type: integer }
        correct: { type: boolean }
        explanation: { type: string }

    DiagnosticResult:
      type: object
      required: [sessionId, slot, label, graded, scorePercent, passed, skillBreakdown, feedback, questions, submittedAt]
      properties:
        sessionId: { type: integer }
        slot:
          type: string
          enum: [baseline, module_1, module_2, module_3, module_4, self]
        label: { type: string }
        graded: { type: boolean }
        scorePercent: { type: number }
        passed: { type: ["boolean", "null"] }
        skillBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticSkillScore"
        feedback: { type: string }
        questions:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticQuestionReview"
        submittedAt: { type: ["string", "null"], format: date-time }

    DiagnosticSessionOrResult:
      type: object
      required: [status, session, result]
      properties:
        status:
          type: string
          enum: [in_progress, submitted]
        session:
          oneOf:
            - $ref: "#/components/schemas/DiagnosticSession"
            - type: "null"
        result:
          oneOf:
            - $ref: "#/components/schemas/DiagnosticResult"
            - type: "null"
